<!doctype html>
<html class="dark" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Taskbar Widgets Settings</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-head">
          <div class="app-icon">
            <span class="material-symbols-outlined filled">widgets</span>
          </div>
          <div>
            <h1>Taskbar Widgets</h1>
            <p><span class="service-dot"></span>System Service: Running</p>
          </div>
        </div>

        <nav class="nav" aria-label="Settings navigation">
          <button class="nav-item active" data-page="library">
            <span class="material-symbols-outlined filled">widgets</span>
            <span>Widget Library</span>
          </button>
          <button class="nav-item" data-page="rotation">
            <span class="material-symbols-outlined">rebase_edit</span>
            <span>Slider Rotation</span>
          </button>
          <button class="nav-item" data-page="updates">
            <span class="material-symbols-outlined">system_update</span>
            <span>Updates</span>
          </button>
          <button class="nav-item" data-page="settings">
            <span class="material-symbols-outlined">settings</span>
            <span>Settings</span>
          </button>
        </nav>

        <div class="sidebar-foot">
          <button class="nav-item muted" type="button">
            <span class="material-symbols-outlined">help</span>
            <span>Help</span>
          </button>
          <button class="nav-item muted" type="button">
            <span class="material-symbols-outlined">chat_bubble</span>
            <span>Feedback</span>
          </button>
        </div>
      </aside>

      <section class="workspace">
        <div id="page" class="page"></div>
      </section>
    </main>

    <div id="taskbar-preview" class="floating-taskbar"></div>

    <script src="./generated/widget-catalog.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
