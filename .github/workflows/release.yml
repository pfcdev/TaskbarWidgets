name: Build Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example 0.1.3"
        required: true
        type: string
      draft:
        description: "Create the release as a draft"
        required: false
        default: false
        type: boolean
      prerelease:
        description: "Mark the release as a prerelease"
        required: false
        default: false
        type: boolean
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish Windows release
    runs-on: windows-latest
    env:
      INPUT_VERSION: ${{ inputs.version || '' }}
      INPUT_DRAFT: ${{ inputs.draft || false }}
      INPUT_PRERELEASE: ${{ inputs.prerelease || false }}
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release version
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $version = $env:INPUT_VERSION
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = $env:GITHUB_REF_NAME -replace '^[vV]', ''
          }
          if ($version -notmatch '^\d+\.\d+\.\d+(\.\d+)?$') {
            throw "Version must be numeric SemVer-like text such as 0.1.3 or 0.1.3.1. Got: $version"
          }
          "RELEASE_VERSION=$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8
          "RELEASE_TAG=v$version" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Rust
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          rustup default stable

      - name: Install native build tools
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          winget source update
          if ($LASTEXITCODE -ne 0) {
            throw "winget source update failed with exit code $LASTEXITCODE"
          }
          winget install --id RamenSoftware.Windhawk --exact --silent --accept-package-agreements --accept-source-agreements
          if ($LASTEXITCODE -ne 0) {
            throw "Windhawk install failed with exit code $LASTEXITCODE"
          }
          winget install --id NSIS.NSIS --exact --silent --accept-package-agreements --accept-source-agreements
          if ($LASTEXITCODE -ne 0) {
            throw "NSIS install failed with exit code $LASTEXITCODE"
          }
          $windhawkCompiler = "C:\Program Files\Windhawk\Compiler\bin\clang++.exe"
          if (-not (Test-Path $windhawkCompiler)) {
            throw "Windhawk compiler was not installed at $windhawkCompiler"
          }
          "TASKBARSTATS_CLANGXX=$windhawkCompiler" | Out-File -FilePath $env:GITHUB_ENV -Append -Encoding utf8

      - name: Build product
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File .\scripts\build-product.ps1 -Configuration Release -Version $env:RELEASE_VERSION

      - name: Build NSIS installer
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          powershell -ExecutionPolicy Bypass -File .\scripts\build-installer.ps1 -Configuration Release -Version $env:RELEASE_VERSION -SkipProductBuild -InstallNsisIfMissing

      - name: Verify release assets
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $files = @(
            "artifacts\TaskbarStats\TaskbarStats.exe",
            "artifacts\TaskbarStats\TaskbarStats.exe.sha256",
            "artifacts\TaskbarStatsSetup.exe",
            "artifacts\TaskbarStatsSetup.exe.sha256"
          )
          foreach ($file in $files) {
            if (-not (Test-Path $file)) {
              throw "Missing release asset: $file"
            }
          }
          Get-Item $files | Select-Object FullName, Length, LastWriteTime

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: TaskbarStats-${{ env.RELEASE_VERSION }}
          path: |
            artifacts/TaskbarStats/TaskbarStats.exe
            artifacts/TaskbarStats/TaskbarStats.exe.sha256
            artifacts/TaskbarStatsSetup.exe
            artifacts/TaskbarStatsSetup.exe.sha256

      - name: Publish GitHub release
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $PSNativeCommandUseErrorActionPreference = $false
          $files = @(
            "artifacts\TaskbarStats\TaskbarStats.exe",
            "artifacts\TaskbarStats\TaskbarStats.exe.sha256",
            "artifacts\TaskbarStatsSetup.exe",
            "artifacts\TaskbarStatsSetup.exe.sha256"
          )
          $notes = "TaskbarStats $env:RELEASE_TAG build. Use TaskbarStatsSetup.exe for normal Windows installation/update."
          gh release view $env:RELEASE_TAG --repo $env:GITHUB_REPOSITORY *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload $env:RELEASE_TAG @files --repo $env:GITHUB_REPOSITORY --clobber
            exit $LASTEXITCODE
          }

          $args = @(
            "release", "create", $env:RELEASE_TAG
          ) + $files + @(
            "--repo", $env:GITHUB_REPOSITORY,
            "--title", "TaskbarStats $env:RELEASE_TAG",
            "--notes", $notes
          )

          if ($env:GITHUB_REF_TYPE -ne "tag") {
            $args += @("--target", $env:GITHUB_SHA)
          }
          if ($env:INPUT_DRAFT -eq "true") {
            $args += "--draft"
          }
          if ($env:INPUT_PRERELEASE -eq "true") {
            $args += "--prerelease"
          }

          gh @args
